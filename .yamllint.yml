extends: default

ignore: |
  vendor/*
  drainpipe-dev/*

rules:
  braces:
    max-spaces-inside: 1
    max-spaces-inside-empty: 1
  brackets:
    max-spaces-inside: 1
    max-spaces-inside-empty: 1
  document-start:
    present: false
  empty-lines:
    max: 1
  line-length: disable
  indentation:
    spaces: 2
  truthy: disable
