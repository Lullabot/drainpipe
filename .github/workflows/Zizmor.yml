name: Zizmor

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  zizmor:
    name: Run Zizmor Security Analysis
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
      actions: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Filter GitHub Actions paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            gha:
              - '.github/**'
              - 'drainpipe-dev/.github/**'
              - 'scaffold/github/**'

      - name: Install Zizmor
        if: steps.filter.outputs.gha == 'true'
        run: pip install zizmor==1.22.0

      - name: Run Zizmor
        id: zizmor
        if: steps.filter.outputs.gha == 'true'
        run: zizmor --format sarif .github drainpipe-dev/.github scaffold/github > zizmor.sarif
        continue-on-error: true

      - name: Upload SARIF
        if: always() && steps.filter.outputs.gha == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: zizmor.sarif
          category: zizmor

      - name: Fail on findings
        if: steps.filter.outputs.gha == 'true' && steps.zizmor.outcome == 'failure'
        run: exit 1
