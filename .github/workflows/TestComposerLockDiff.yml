name: "Test Composer Lock Diff"

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  Test-Composer-Lock-Diff:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        drupal-version: [ 10, 11 ]
    steps:
      - name: Create a Drupal project
        run: composer create-project drupal/recommended-project:^${{ matrix.drupal-version }} . --ignore-platform-reqs

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: drainpipe
          persist-credentials: false

      - name: Setup drainpipe-dev
        run: mv drainpipe/drainpipe-dev .

      - uses: ./drainpipe/scaffold/github/actions/common/set-env

      - name: Install DDEV
        uses: ./drainpipe/scaffold/github/actions/common/ddev
        with:
          git-name: Drainpipe Bot
          git-email: no-reply@example.com
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Setup Project
        run: |
          ddev config --auto
          ddev start
          ddev exec --raw composer config extra.drupal-scaffold.gitignore true
          ddev exec --raw composer config --json extra.drupal-scaffold.allowed-packages '["lullabot/drainpipe-dev", "lullabot/drainpipe"]'
          ddev exec --raw composer config --no-plugins allow-plugins.composer/installers true
          ddev exec --raw composer config --no-plugins allow-plugins.drupal/core-composer-scaffold true
          ddev exec --raw composer config --no-plugins allow-plugins.lullabot/drainpipe true
          ddev exec --raw composer config --no-plugins allow-plugins.lullabot/drainpipe-dev true
          ddev exec --raw composer config repositories.drainpipe --json '{"type": "path", "url": "drainpipe", "options": {"symlink": false}}'
          ddev exec --raw composer config repositories.drainpipe-dev --json '{"type": "path", "url": "drainpipe-dev", "options": {"symlink": false}}'
          ddev exec --raw composer config minimum-stability dev
          ddev composer require "lullabot/drainpipe @dev" --with-all-dependencies
          ddev composer require "lullabot/drainpipe-dev @dev" --dev --with-all-dependencies
          ddev restart

      - name: Commit current state
        run: |
          echo "/drainpipe" >> .gitignore
          git config --global user.email "no-reply@example.com"
          git config --global user.name "Drainpipe Bot"
          git init
          git add .
          git commit -m "Initial commit"

      - name: Install Composer Lock Diff
        run: ddev composer require --dev davidrjonas/composer-lock-diff:^1.0

      - name: Add a new package
        run: |
          mkdir -p drainpipe-test-package
          echo '{"name":"drainpipe/test-package","version":"1.0.0","type":"library","description":"Test package for drainpipe CI"}' > drainpipe-test-package/composer.json
          ddev exec --raw composer config repositories.test-package --json '{"type": "path", "url": "drainpipe-test-package", "options": {"symlink": false}}'
          ddev composer require drainpipe/test-package:^1
          git add .
          git commit -m "Add test package"

      - name: "composer:lock-diff - generates non-empty diff file"
        run: |
          ddev task "composer:lock-diff from=HEAD~1 output=lock-diff.md"
          if [ "$(cat lock-diff.md)" == "" ]; then
            echo "Expected non-empty composer lock diff output"
            exit 1
          fi
          if ! grep -q "drainpipe/test-package" lock-diff.md; then
            echo "Expected drainpipe/test-package in lock diff output"
            exit 1
          fi

      - name: "composer:lock-diff - generates empty diff file when lock is unchanged"
        run: |
          ddev task "composer:lock-diff from=HEAD output=lock-diff-empty.md"
          if [ "$(cat lock-diff-empty.md)" != "" ]; then
            echo "Expected empty diff when composer.lock has not changed"
            exit 1
          fi

      - name: "gitlab:lock-diff - creates note when diff is non-empty"
        run: |
          rm -f /tmp/mock_requests.log
          MOCK_GET_RESPONSE='[]' MOCK_LOG_FILE=/tmp/mock_requests.log \
            php -S 0.0.0.0:9876 drainpipe/tests/mock-server.php &>/dev/null &
          SERVER_PID=$!
          sleep 1
          echo "Some dependency changes" > test-diff-nonempty.md
          ddev task "gitlab:lock-diff diff_file='test-diff-nonempty.md' project_id='1' mr_iid='1' gitlab_api_url='http://host.docker.internal:9876' access_token='test'"
          kill $SERVER_PID || true
          if ! grep -q "^POST" /tmp/mock_requests.log; then
            echo "Expected a POST request to create the note"
            cat /tmp/mock_requests.log || true
            exit 1
          fi
          if grep -qE "^(PUT|DELETE)" /tmp/mock_requests.log; then
            echo "Unexpected mutating request (expected only POST)"
            cat /tmp/mock_requests.log
            exit 1
          fi

      - name: "gitlab:lock-diff - no API calls when diff is empty"
        run: |
          rm -f /tmp/mock_requests.log
          MOCK_GET_RESPONSE='[]' MOCK_LOG_FILE=/tmp/mock_requests.log \
            php -S 0.0.0.0:9877 drainpipe/tests/mock-server.php &>/dev/null &
          SERVER_PID=$!
          sleep 1
          echo -n "" > test-diff-empty.md
          ddev task "gitlab:lock-diff diff_file='test-diff-empty.md' project_id='1' mr_iid='1' gitlab_api_url='http://host.docker.internal:9877' access_token='test'"
          kill $SERVER_PID || true
          if [ -s /tmp/mock_requests.log ]; then
            echo "Expected no mutating API calls when diff is empty"
            cat /tmp/mock_requests.log
            exit 1
          fi

      - name: "gitlab:lock-diff - updates existing note when diff is non-empty"
        run: |
          rm -f /tmp/mock_requests.log
          MOCK_GET_RESPONSE='[{"id":42,"body":"<!-- composer-lock-diff -->\n## Composer Lock Diff\nOld content"}]' \
            MOCK_LOG_FILE=/tmp/mock_requests.log \
            php -S 0.0.0.0:9878 drainpipe/tests/mock-server.php &>/dev/null &
          SERVER_PID=$!
          sleep 1
          echo "Updated dependency changes" > test-diff-update.md
          ddev task "gitlab:lock-diff diff_file='test-diff-update.md' project_id='1' mr_iid='1' gitlab_api_url='http://host.docker.internal:9878' access_token='test'"
          kill $SERVER_PID || true
          if ! grep -q "^PUT /projects/1/merge_requests/1/notes/42" /tmp/mock_requests.log; then
            echo "Expected a PUT request to update note 42"
            cat /tmp/mock_requests.log || true
            exit 1
          fi
          if grep -q "^POST" /tmp/mock_requests.log; then
            echo "Unexpected POST - should update, not create"
            cat /tmp/mock_requests.log
            exit 1
          fi

      - name: "gitlab:lock-diff - deletes existing note when diff is empty"
        run: |
          rm -f /tmp/mock_requests.log
          MOCK_GET_RESPONSE='[{"id":99,"body":"<!-- composer-lock-diff -->\n## Composer Lock Diff\nOld content"}]' \
            MOCK_LOG_FILE=/tmp/mock_requests.log \
            php -S 0.0.0.0:9879 drainpipe/tests/mock-server.php &>/dev/null &
          SERVER_PID=$!
          sleep 1
          echo -n "" > test-diff-delete.md
          ddev task "gitlab:lock-diff diff_file='test-diff-delete.md' project_id='1' mr_iid='1' gitlab_api_url='http://host.docker.internal:9879' access_token='test'"
          kill $SERVER_PID || true
          if ! grep -q "^DELETE /projects/1/merge_requests/1/notes/99" /tmp/mock_requests.log; then
            echo "Expected a DELETE request to remove note 99"
            cat /tmp/mock_requests.log || true
            exit 1
          fi
          if grep -qE "^(POST|PUT)" /tmp/mock_requests.log; then
            echo "Unexpected create/update call when diff is empty"
            cat /tmp/mock_requests.log
            exit 1
          fi
