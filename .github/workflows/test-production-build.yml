name: Test Production Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  Test-Production-Build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        php-version: [ 8.2, 8.3, 8.4, 8.5 ]
        include:
          - php-version: 8.2
            drupal-version: ":^10"
          - php-version: 8.3
            drupal-version: ":^10"
          - php-version: 8.4
            drupal-version: ":^10"
          - php-version: 8.5
            drupal-version: ":^10"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # 2.36.0
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          extensions: gd

      - name: Get composer cache directory
        id: composer-cache
        run: echo "::set-output name=dir::$(composer config cache-files-dir)"

      - name: Cache dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Drupal
        run: |
          cd ../
          composer create-project drupal/recommended-project${{ matrix.drupal-version }} drupal --ignore-platform-reqs
          cd drupal
          cp ${GITHUB_WORKSPACE}/tests/fixtures.drainpipe-test-build/Taskfile.yml .
          composer config extra.drupal-scaffold.gitignore true
          composer config --json extra.drupal-scaffold.allowed-packages '["lullabot/drainpipe"]'
          composer config --no-plugins allow-plugins.composer/installers true
          composer config --no-plugins allow-plugins.drupal/core-composer-scaffold true
          composer config --no-plugins allow-plugins.lullabot/drainpipe true
          composer config repositories.drainpipe --json '{"type": "path", "url": "../drainpipe", "options": {"symlink": false}}'
          composer config minimum-stability dev
          composer require "lullabot/drainpipe @dev" --with-all-dependencies

      - name: Run production build via alias
        run: |
          cd ../drupal
          ./vendor/bin/task build

      - name: Verify unified task is no-op after production build
        run: |
          cd ../drupal
          # After a production build, calling drupal:composer with COMPOSER_NO_DEV=1
          # should be a no-op (status check passes, task is skipped).
          ./vendor/bin/task drupal:composer COMPOSER_NO_DEV=1 2>&1 | tee /tmp/task-output.txt
          # Task prints nothing when skipped via status check, so verify
          # composer install was NOT run again.
          if grep -q "Installing\|Updating\|Nothing to install" /tmp/task-output.txt; then
            echo "FAIL: composer ran again when it should have been skipped"
            exit 1
          fi

      - name: Verify passthrough status check does not undo production build
        run: |
          cd ../drupal
          # Calling drupal:composer without COMPOSER_NO_DEV (the empty/passthrough
          # case) should be a no-op because installed.json exists. This is the
          # scenario when drupal:update depends on drupal:composer.
          ./vendor/bin/task drupal:composer 2>&1 | tee /tmp/task-output.txt
          if grep -q "Installing\|Updating\|Nothing to install" /tmp/task-output.txt; then
            echo "FAIL: composer ran again when it should have been skipped"
            exit 1
          fi
          # Verify vendor is still in production mode (no dev packages).
          if [ -f "vendor/lullabot/drainpipe-dev/composer.json" ]; then
            echo "FAIL: dev dependencies were installed in production build"
            exit 1
          fi
          grep -q '"dev": false' vendor/composer/installed.json
