name: 'Deploy Review app to Pantheon'
description: 'Deploys a review app to Pantheon Multidev'
inputs:
  github-token:
    description: "GitHub token as generated automatically in secrets.GITHUB_TOKEN"
    required: true
  terminus-token:
    description: "Pantheon Terminus Token"
    required: true
  site-name:
    description: "Pantheon site machine name"
    required: true
  run-installer:
    description: "Whether or not to run the Drupal site installer. Defaults to false."
    required: false
  commit-message:
    description: "The commit message to use when pushing to Pantheon"
    required: true
  lock-username:
    description: "The username if locking this environment with Basic Auth"
    required: false
  lock-password:
    description: "The password if locking this environment with Basic Auth"
    required: false
  clone-from:
    description: "The environment to clone from. Defaults to live."
    required: false
    default: "live"
  terminus-timeout-limit:
    description: "The number of seconds that terminus will wait until timeout. Defaults to 600."
    required: false
    default: "600"
  skip-wipe-multidev:
    description: "Whether or not to skip wiping the multidev on each push. Defaults to false."
    required: false
    default: "false"
  async:
    description: "When 'true', skip the post-deploy step (terminus workflow:wait, drush update, deployment success). The Quicksilver async flow handles that in a separate job."
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/drainpipe/set-env

    - name: Validate site-name parameter
      env:
        INPUT_SITE_NAME: ${{ inputs.site-name }}
      run: |
        SITE_NAME="$INPUT_SITE_NAME"
        if ! [[ "$SITE_NAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
          echo "::error::site-name parameter must contain only alphanumeric characters, underscores, and hyphens."
          exit 1
        fi
        echo "Site name validated: $SITE_NAME"
      shell: bash

    - name: Validate clone-from parameter
      env:
        INPUT_CLONE_FROM: ${{ inputs.clone-from }}
      run: |
        CLONE_FROM="$INPUT_CLONE_FROM"
        if ! [[ "$CLONE_FROM" =~ ^[a-zA-Z0-9._-]+$ ]]; then
          echo "::error::clone-from parameter must contain only alphanumeric characters, periods, underscores, and hyphens."
          exit 1
        fi
        echo "Clone-from environment validated: $CLONE_FROM"
      shell: bash

    - name: Trust all drush.in hosts
      run: |
        source .github/actions/drainpipe/set-env/bash_aliases
        drainpipe_exec "echo -e \"Host *.drush.in\n    StrictHostKeyChecking no\n    HostkeyAlgorithms +ssh-rsa\n    PubkeyAcceptedKeyTypes +ssh-rsa\" >> ~/.ssh/config"
        drainpipe_exec "cat ~/.ssh/config"
      shell: bash

    - name: Create GitHub Deployment
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: | # zizmor: ignore[github-env]
        export GITHUB_DEPLOYMENT=$(curl -f -X POST \
            https://api.github.com/repos/$GITHUB_REPOSITORY/deployments \
            -H 'Accept: application/vnd.github.v3+json' \
            -H "Authorization: token $GITHUB_TOKEN" \
            -d "{\"ref\": \"$DRAINPIPE_SHA\", \"auto_merge\": false, \"environment\": \"pantheon-pr-$DRAINPIPE_PR_NUMBER\", \"transient_environment\": true, \"required_contexts\": [], \"description\": \"Pantheon Multidev for Pull Request #$DRAINPIPE_PR_NUMBER\"}" \
        )
        export GITHUB_DEPLOYMENT_ID=$(echo $GITHUB_DEPLOYMENT | jq '.id')
        echo "Created GitHub Deployment ID $GITHUB_DEPLOYMENT_ID"
        if [ -z "$GITHUB_DEPLOYMENT_ID" ] || [ "$GITHUB_DEPLOYMENT_ID" = "null" ]; then echo $GITHUB_DEPLOYMENT && exit 1; fi
        echo "GITHUB_DEPLOYMENT_ID=$GITHUB_DEPLOYMENT_ID" >> $GITHUB_ENV
        curl -f -H "Authorization: token $GITHUB_TOKEN" -X POST -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/$GITHUB_REPOSITORY/deployments/$GITHUB_DEPLOYMENT_ID/statuses -d "{\"state\":\"in_progress\",\"log_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
      shell: bash

    - name: Clean Stale Environments
      env:
        INPUT_TERMINUS_TOKEN: ${{ inputs.terminus-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_SITE_NAME: ${{ inputs.site-name }}
      run: |
        source .github/actions/drainpipe/set-env/bash_aliases
        echo "Cleaning stale Multidev environments"
        drainpipe_exec "terminus auth:login --machine-token=\"$INPUT_TERMINUS_TOKEN\""
        PULLS=$(curl -f \
            https://api.github.com/repos/$GITHUB_REPOSITORY/pulls?state=open \
            -H 'Accept: application/vnd.github.v3+json' \
            -H "Authorization: token $GITHUB_TOKEN" \
        )
        # Truncate PR names to 11 chars to match Pantheon's multidev name limit.
        PULL_NUMBERS=$(echo $PULLS | jq -r '.[] | "pr-" + (.number|tostring)' | cut -c1-11)
        MULTIDEVS=$(drainpipe_exec "terminus multidev:list --format json $INPUT_SITE_NAME | jq --raw-output 'keys | .[]'")
        for MULTIDEV in $MULTIDEVS; do
          if echo "$PULL_NUMBERS" | grep -Fxq "$MULTIDEV"; then
            echo "Found open PR for $MULTIDEV"
          # if $MULTIDEV starts with "pr-"
          elif [[ $MULTIDEV == pr-* ]]; then
            echo "No PR for $MULTIDEV, shutting down..."
            DEPLOYMENTS=$(curl -s -f -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/$GITHUB_REPOSITORY/deployments?environment=pantheon-$MULTIDEV | jq '.[] | .id')
            for DEPLOYMENT_ID in $DEPLOYMENTS; do
              echo "Marking GitHub Deployment $DEPLOYMENT_ID as inactive"
              curl -f -H "Authorization: token $GITHUB_TOKEN" -X POST -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/$GITHUB_REPOSITORY/deployments/$DEPLOYMENT_ID/statuses -d "{\"state\":\"inactive\"}"
              curl -H "Authorization: token $GITHUB_TOKEN" -X DELETE -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/$GITHUB_REPOSITORY/environments/pantheon-$MULTIDEV
            done
            drainpipe_exec "terminus multidev:delete $INPUT_SITE_NAME.$MULTIDEV --delete-branch --yes"
          else
            echo "Dangling Multidev environment $MULTIDEV found, no action taken."
          fi
        done
      shell: bash

    - name: Create or Update Multidev
      env:
        INPUT_TERMINUS_TOKEN: ${{ inputs.terminus-token }}
        INPUT_SITE_NAME: ${{ inputs.site-name }}
        INPUT_CLONE_FROM: ${{ inputs.clone-from }}
        INPUT_RUN_INSTALLER: ${{ inputs.run-installer }}
        INPUT_SKIP_WIPE_MULTIDEV: ${{ inputs.skip-wipe-multidev }}
      run: | # zizmor: ignore[github-env]
        source .github/actions/drainpipe/set-env/bash_aliases
        drainpipe_exec "terminus auth:login --machine-token=\"$INPUT_TERMINUS_TOKEN\""
        REQUESTED_NAME="pr-$DRAINPIPE_PR_NUMBER"
        JQ_COMMAND="'.[] | select(.id == \"$REQUESTED_NAME\") | .id'"
        ENVIRONMENT_EXISTS=$(drainpipe_exec "terminus multidev:list --format json $INPUT_SITE_NAME | jq --raw-output $JQ_COMMAND")
        if [ "$ENVIRONMENT_EXISTS" == "$REQUESTED_NAME" ]; then
          if [ "$INPUT_SKIP_WIPE_MULTIDEV" != "true" ]; then
             drainpipe_exec "terminus env:wipe $INPUT_SITE_NAME.$REQUESTED_NAME --yes"
          fi
          MULTIDEV_NAME="$REQUESTED_NAME"
        else
          if [ "$INPUT_SKIP_WIPE_MULTIDEV" != "true" ]; then
            drainpipe_exec "terminus multidev:create $INPUT_SITE_NAME.$INPUT_CLONE_FROM $REQUESTED_NAME --no-db --no-files --yes"
          else
            drainpipe_exec "terminus multidev:create $INPUT_SITE_NAME.$INPUT_CLONE_FROM $REQUESTED_NAME --yes"
          fi
          # Query Pantheon for the actual environment name, which may have been
          # truncated to 11 characters by the platform.
          MULTIDEV_NAME=$(drainpipe_exec "terminus multidev:list --format json $INPUT_SITE_NAME | jq --raw-output 'keys | .[] | select(startswith(\"${REQUESTED_NAME:0:11}\"))'")
          echo "::notice::Requested multidev name: $REQUESTED_NAME — Pantheon created: $MULTIDEV_NAME"
        fi
        echo "MULTIDEV_NAME=$MULTIDEV_NAME" >> $GITHUB_ENV
        if [ "$INPUT_RUN_INSTALLER" != "true" ] && [ "$INPUT_SKIP_WIPE_MULTIDEV" != "true" ]; then
            drainpipe_exec "terminus env:clone-content $INPUT_SITE_NAME.$INPUT_CLONE_FROM $MULTIDEV_NAME --yes"
        fi
      shell: bash

    - name: Push to Pantheon
      env:
        INPUT_SITE_NAME: ${{ inputs.site-name }}
        INPUT_COMMIT_MESSAGE: ${{ inputs.commit-message }}
      run: |
        source .github/actions/drainpipe/set-env/bash_aliases
        SITE_ID=$(drainpipe_exec "terminus site:lookup $INPUT_SITE_NAME")
        drainpipe_exec "terminus connection:set  $INPUT_SITE_NAME.$MULTIDEV_NAME git --yes"
        drainpipe_exec "./vendor/bin/task deploy:git directory=/tmp/release branch=$MULTIDEV_NAME remote=ssh://codeserver.dev.$SITE_ID@codeserver.dev.$SITE_ID.drush.in:2222/~/repository.git message=\"$INPUT_COMMIT_MESSAGE\" site=$INPUT_SITE_NAME.$MULTIDEV_NAME"
      shell: bash

    - name: Deploy to Pantheon
      env:
        INPUT_TERMINUS_TIMEOUT: ${{ inputs.terminus-timeout-limit }}
        INPUT_SITE_NAME: ${{ inputs.site-name }}
        INPUT_RUN_INSTALLER: ${{ inputs.run-installer }}
        INPUT_LOCK_USERNAME: ${{ inputs.lock-username }}
        INPUT_LOCK_PASSWORD: ${{ inputs.lock-password }}
        INPUT_ASYNC: ${{ inputs.async }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        source .github/actions/drainpipe/set-env/bash_aliases

        if [ "$INPUT_ASYNC" != "true" ]; then
          echo "::notice::Waiting $INPUT_TERMINUS_TIMEOUT seconds for Pantheon to sync..."
          drainpipe_exec "terminus workflow:wait -vv --max $INPUT_TERMINUS_TIMEOUT -- $INPUT_SITE_NAME.$MULTIDEV_NAME"

          drainpipe_exec "terminus aliases --only $INPUT_SITE_NAME --yes"
          if [ "$INPUT_RUN_INSTALLER" == "true" ]; then
            drainpipe_exec "./vendor/bin/drush @$INPUT_SITE_NAME.$MULTIDEV_NAME --yes site:install --existing-config"
          elif drainpipe_exec "./vendor/bin/task -l | grep '* update: '"; then
            drainpipe_exec "./vendor/bin/task update site=@$INPUT_SITE_NAME.$MULTIDEV_NAME"
          else
            drainpipe_exec "./vendor/bin/task drupal:update site=@$INPUT_SITE_NAME.$MULTIDEV_NAME"
          fi
          ENVIRONMENT_URL="https://$MULTIDEV_NAME-$INPUT_SITE_NAME.pantheonsite.io"
          # Lock Environment.
          if [ "$INPUT_LOCK_USERNAME" != "" ] && [ "$INPUT_LOCK_PASSWORD" != "" ]; then
            drainpipe_exec "terminus lock:enable $INPUT_SITE_NAME.$MULTIDEV_NAME $INPUT_LOCK_USERNAME $INPUT_LOCK_PASSWORD"
            ENVIRONMENT_URL="https://$INPUT_LOCK_USERNAME:$INPUT_LOCK_PASSWORD@$MULTIDEV_NAME-$INPUT_SITE_NAME.pantheonsite.io"
          fi
          curl -f -H "Authorization: token $GITHUB_TOKEN" -X POST -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/$GITHUB_REPOSITORY/deployments/$GITHUB_DEPLOYMENT_ID/statuses -d "{\"state\":\"success\", \"environment_url\": \"$ENVIRONMENT_URL\"}"
        else
          SITE_UUID=$(drainpipe_exec "terminus site:info --format=json $INPUT_SITE_NAME" 2>/dev/null | jq -r '.id // ""') || SITE_UUID=""
          PANTHEON_LOG_URL=""
          if [ -n "$SITE_UUID" ]; then
            PANTHEON_LOG_URL="https://dashboard.pantheon.io/sites/$SITE_UUID#$MULTIDEV_NAME/workflows"
          fi
          POST_DEPLOY_RUNS_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/workflows/PantheonReviewAppsPostDeploy.yml"
          {
            printf '\n## Pantheon Async Deploy \xe2\x80\x94 Code Pushed\n\n'
            printf 'Code has been pushed to Pantheon multidev `%s`. The CI runner is now free.\n\n' "$MULTIDEV_NAME"
            printf 'Pantheon will sync the code internally (typically 2\xe2\x80\x935 minutes). Once sync completes, the\n'
            printf 'Quicksilver hook fires and triggers the **Pantheon Review Apps Post-Deploy** workflow to run\n'
            printf 'Drupal updates and mark the deployment as ready.\n\n'
            printf '### If the post-deploy job does not appear within 20 minutes\n\n'
            printf '| Resource | Action |\n'
            printf '|----------|--------|\n'
            printf '| Pantheon workflow logs (Quicksilver output) | %s |\n' "$PANTHEON_LOG_URL"
            printf '| GitHub Actions \xe2\x80\x94 post-deploy runs | %s |\n' "$POST_DEPLOY_RUNS_URL"
            printf '| Local terminus diagnosis | `terminus workflow:list %s.%s` |\n' "$INPUT_SITE_NAME" "$MULTIDEV_NAME"
            printf '\n'
          } >> "$GITHUB_STEP_SUMMARY"
        fi
      shell: bash

    - name: Set Deployment Failure Status
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        curl -f -H "Authorization: token $GITHUB_TOKEN" -X POST -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/$GITHUB_REPOSITORY/deployments/$GITHUB_DEPLOYMENT_ID/statuses -d "{\"state\":\"failure\",\"log_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
      if: ${{ failure() }}
      shell: bash
