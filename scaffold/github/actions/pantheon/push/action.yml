name: 'Push code to Pantheon'
description: 'Pushes code to a Pantheon site'
inputs:
  terminus-token:
    description: "Pantheon Terminus Token"
    required: true
  site-name:
    description: "Pantheon site machine name"
    required: true
  branch:
    description: "Which branch to push to"
    required: true
  commit-message:
    description: "The commit message to use when pushing to Pantheon"
    required: true
runs:
  using: "composite"
  steps:
    - name: Trust all drush.in hosts
      run: |
        source .github/actions/drainpipe/set-env/bash_aliases
        drainpipe_exec "echo -e \"Host *.drush.in\n    StrictHostKeyChecking no\n    HostkeyAlgorithms +ssh-rsa\n    PubkeyAcceptedKeyTypes +ssh-rsa\" >> ~/.ssh/config"
      shell: bash

    - name: Push to Pantheon
      env:
        INPUT_TERMINUS_TOKEN: ${{ inputs.terminus-token }}
        INPUT_SITE_NAME: ${{ inputs.site-name }}
        INPUT_BRANCH: ${{ inputs.branch }}
        INPUT_COMMIT_MESSAGE: ${{ inputs.commit-message }}
      run: |
        source .github/actions/drainpipe/set-env/bash_aliases
        drainpipe_exec terminus auth:login --machine-token="$INPUT_TERMINUS_TOKEN"
        SITE_ID=$(drainpipe_exec "terminus site:lookup $INPUT_SITE_NAME")
        if [ "$INPUT_BRANCH" == "master" ]; then
          drainpipe_exec "terminus connection:set $INPUT_SITE_NAME.dev git --yes"
        else
          drainpipe_exec "terminus connection:set $INPUT_SITE_NAME.$INPUT_BRANCH git --yes"
        fi
        drainpipe_exec "./vendor/bin/task deploy:git directory=/tmp/release branch=$INPUT_BRANCH remote=ssh://codeserver.dev.$SITE_ID@codeserver.dev.$SITE_ID.drush.in:2222/~/repository.git message=\"$INPUT_COMMIT_MESSAGE\""
      shell: bash
