name: "Pantheon Review Apps Watchdog"

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      threshold_minutes:
        description: 'Minutes before an in_progress deployment is considered stale'
        required: false
        default: '20'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  deployments: write
  contents: read

jobs:
  Drainpipe-Watchdog-Pantheon:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/drainpipe/pantheon/setup-terminus
        id: terminus-setup
        continue-on-error: true
        with:
          terminus-token: ${{ secrets.TERMINUS_MACHINE_TOKEN || secrets.PANTHEON_TERMINUS_TOKEN }}

      - name: Detect and resolve stale deployments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_NAME: ${{ vars.PANTHEON_SITE_NAME || secrets.PANTHEON_SITE_NAME }}
          THRESHOLD_MINUTES: ${{ inputs.threshold_minutes || vars.PANTHEON_ASYNC_WATCHDOG_THRESHOLD_MINUTES || '20' }}
          TERMINUS_AVAILABLE: ${{ steps.terminus-setup.outcome == 'success' }}
        run: bash .github/scripts/pantheon-watchdog.sh
        shell: bash
