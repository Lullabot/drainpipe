version: '3'

tasks:
  composerlock-diff:
    desc: Posts a composer lock diff comment on a GitLab merge request
    summary: |
      Posts a composer lock diff as a GitLab MR note. Reads GITLAB_ACCESS_TOKEN from
      the environment.

      usage: task gitlab:composerlock-diff diff_file=... project_id=... mr_iid=...

      diff_file    Path to the composer-lock-diff.md output file
      project_id   GitLab project ID ($CI_PROJECT_ID)
      mr_iid       Merge request IID ($CI_MERGE_REQUEST_IID)
    cmds:
      - task: :composer:composerlock-diff
        vars:
          diff_file: "{{ .diff_file }}"
          auth_header: "PRIVATE-TOKEN: $GITLAB_ACCESS_TOKEN"
          list_url: "https://gitlab.com/api/v4/projects/{{ .project_id }}/merge_requests/{{ .mr_iid }}/notes?per_page=100"
          comment_url: "https://gitlab.com/api/v4/projects/{{ .project_id }}/merge_requests/{{ .mr_iid }}/notes"
          create_url: "https://gitlab.com/api/v4/projects/{{ .project_id }}/merge_requests/{{ .mr_iid }}/notes"
